<template>
    <div if:false={hideButton} class={buttonContainerClass}>
        <lightning-button
            class="custom-button"
            label={buttonLabel}
            onclick={openModal}>
        </lightning-button>
    </div>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">{modalHeader}</h2>
                    <button class="slds-button slds-button_icon slds-modal__close"
                            title="Close"
                            onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-flow
                        flow-api-name={flowName}
                        flow-input-variables={flowInputs}
                        onstatuschange={handleStatusChange}>
                    </lightning-flow>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
