<template>
    <lightning-card title="Capture the employee details" icon-name="standard:lead">
        <lightning-input label="Enter Employee Name" onchange={CapName}></lightning-input>
        <lightning-input label="Enter Employee age" onchange={CapAge}></lightning-input>
        <lightning-input label="Enter Employee salary" onchange={CapSal}></lightning-input>
        <lightning-input label="Enter Employee city" onchange={CapCity}></lightning-input>

        <lightning-button label="SUBMIT" variant="brand" icon-name="utility:heart" onclick={subme}></lightning-button>
    </lightning-card>
</template>
